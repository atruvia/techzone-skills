<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, cool-tinted shadows — never harsh black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: flex; gap: 26px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lbl">xs</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="lbl">brand</div></div>
  </div>
</body>
</html>
