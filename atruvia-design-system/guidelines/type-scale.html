<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="11 → 76px modular ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 70px; flex: none; }
  .ex { color: var(--text-strong); font-weight: var(--weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="line"><span class="tok">6xl/76</span><span class="ex" style="font-size:var(--text-6xl);letter-spacing:var(--tracking-tight)">Aa</span></div>
  <div class="line"><span class="tok">4xl/48</span><span class="ex" style="font-size:var(--text-4xl)">Verbinden</span></div>
  <div class="line"><span class="tok">2xl/28</span><span class="ex" style="font-size:var(--text-2xl)">Digitalisierungspartner</span></div>
  <div class="line"><span class="tok">lg/18</span><span class="ex" style="font-size:var(--text-lg);font-weight:var(--weight-regular)">einfach. sicher. digital.</span></div>
  <div class="line"><span class="tok">sm/14</span><span class="ex" style="font-size:var(--text-sm);font-weight:var(--weight-regular)">Body small &amp; captions</span></div>
</body>
</html>
