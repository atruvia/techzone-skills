<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 78px; }
  .meta { padding: 8px 10px; }
  .name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--atr-ink-900)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#000064</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--atr-blue-500)"></div><div class="meta"><div class="name">Blue</div><div class="hex">#0A5AE1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--atr-aqua-100)"></div><div class="meta"><div class="name">Aqua</div><div class="hex">#D4F2F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--atr-coral-500)"></div><div class="meta"><div class="name">Coral</div><div class="hex">#FF5A46</div></div></div>
  </div>
</body>
</html>
