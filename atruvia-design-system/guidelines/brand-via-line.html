<!-- @dsCard group="Brand" viewport="760x340" name="The VIA Line" subtitle="Signature connector — a hand-drawn gradient line joining two ideas" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--surface-page); font-family: var(--font-sans); }
  .eyebrow { font-weight: var(--weight-semibold); letter-spacing: var(--tracking-caps); text-transform: uppercase; font-size: var(--text-xs); color: var(--text-link); }
  h3 { font-family: var(--font-display); font-weight: var(--weight-extrabold); font-size: var(--text-3xl); letter-spacing: var(--tracking-tight); color: var(--text-strong); margin: 10px 0 24px; }
  .caption { font-size: var(--text-xs); color: var(--text-muted); margin: 30px 0 10px; }
  .caption code { font-family: var(--font-mono); }
  hr.atr-via-rule { width: 120px; margin: 0; }
</style>
</head>
<body>
  <div class="eyebrow">Wir verbinden</div>
  <h3>Menschen <span class="atr-via-text">und</span> Technologie</h3>

  <!-- Primary: the hand-drawn connector. One canonical path; swap the two labels. -->
  <svg class="atr-via-line atr-via-line--draw" viewBox="0 0 600 100" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mensch verbunden mit Technologie">
    <defs>
      <linearGradient id="via-grad" gradientUnits="userSpaceOnUse" x1="120" y1="50" x2="480" y2="50">
        <stop offset="0" stop-color="#000064"/><stop offset="0.55" stop-color="#0a5ae1"/><stop offset="1" stop-color="#d4f2f5"/>
      </linearGradient>
    </defs>
    <path d="M120 50 C 165 50, 178 24, 232 24 L 288 24 C 332 24, 346 50, 392 50 C 430 50, 444 30, 480 30" stroke="url(#via-grad)"/>
    <g text-anchor="middle"><text x="60" y="55" font-size="16">Mensch</text><text x="540" y="55" font-size="16">Technologie</text></g>
  </svg>

  <p class="caption">Der schlichte Teiler · <code>.atr-via-rule</code></p>
  <hr class="atr-via-rule" />
</body>
</html>
