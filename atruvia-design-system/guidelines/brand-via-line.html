<!-- @dsCard group="Brand" viewport="700x200" name="The VIA Line" subtitle="Signature connecting element — under headings, between ideas" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--surface-page); font-family: var(--font-sans); }
  .eyebrow { font-weight: var(--weight-semibold); letter-spacing: var(--tracking-caps); text-transform: uppercase; font-size: var(--text-xs); color: var(--text-link); }
  h3 { font-family: var(--font-display); font-weight: var(--weight-extrabold); font-size: var(--text-3xl); letter-spacing: var(--tracking-tight); color: var(--text-strong); margin: 10px 0 14px; }
  .line { height: 4px; width: 120px; border-radius: var(--radius-pill); background: var(--atr-via-gradient); }
  .demo { display: flex; align-items: center; gap: 14px; margin-top: 26px; }
  .demo .node { font-weight: var(--weight-semibold); color: var(--text-strong); white-space: nowrap; }
  .demo .seg { height: 3px; flex: 1; border-radius: var(--radius-pill); background: var(--atr-via-gradient); }
</style>
</head>
<body>
  <div class="eyebrow">Wir verbinden</div>
  <h3>Menschen <span class="atr-via-text">und</span> Technologie</h3>
  <div class="line"></div>
  <div class="demo"><span class="node">Mensch</span><span class="seg"></span><span class="node">Technologie</span></div>
</body>
</html>
