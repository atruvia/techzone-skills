<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success, warning, error — with subtle fills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .dot { width: 28px; height: 28px; border-radius: var(--radius-pill); flex: none; }
  .name { font-size: var(--text-sm); font-weight: var(--weight-semibold); color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="background:var(--atr-success-050)"><span class="dot" style="background:var(--atr-success-500)"></span><div><div class="name">Success</div><div class="hex">#146400</div></div></div>
    <div class="item" style="background:var(--atr-warning-050)"><span class="dot" style="background:var(--atr-warning-500)"></span><div><div class="name">Warning</div><div class="hex">#FA9B50</div></div></div>
    <div class="item" style="background:var(--atr-error-050)"><span class="dot" style="background:var(--atr-error-500)"></span><div><div class="name">Danger</div><div class="hex">#FF5A46</div></div></div>
  </div>
</body>
</html>
