<!-- @dsCard group="Brand" viewport="700x210" name="Voice & tone" subtitle="Warm, human, plain-spoken — du / wir, inclusive, no emoji" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .q { font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--text-xl); color: var(--text-strong); line-height: var(--leading-snug); }
  .card { border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px 18px; }
  .lbl { font-size: var(--text-xs); font-weight: var(--weight-semibold); letter-spacing: var(--tracking-wide); text-transform: uppercase; margin-bottom: 8px; }
  .do { color: var(--atr-success-600); }
  .dont { color: var(--atr-error-600); }
  ul { margin: 0; padding-left: 18px; color: var(--text-body); font-size: var(--text-sm); line-height: 1.7; }
</style>
</head>
<body>
  <div style="grid-column:1 / -1" class="q atr-via-text">„Wir verbinden. Füreinander.“</div>
  <div class="card"><div class="lbl do">Do</div><ul><li>Sprich direkt: „du“ &amp; „wir“</li><li>Inklusiv: Kund*innen, Berater*innen</li><li>Konkrete Beweise: 91 Mio. Konten</li></ul></div>
  <div class="card"><div class="lbl dont">Don't</div><ul><li>Buzzword-Stapel, Hype</li><li>Emoji in Unternehmenskommunikation</li><li>Asterisk weglassen (DE)</li></ul></div>
</body>
</html>
