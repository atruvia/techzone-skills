<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: var(--atr-cream); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .bar { background: var(--atr-navy); height: 16px; border-radius: 4px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); width: 80px; flex: 0 0 80px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-3); margin-left: auto; }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
  <div class="row"><span class="name">--space-5</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
  <div class="row"><span class="name">--space-7</span><div class="bar" style="width:48px"></div><span class="val">48px</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:64px"></div><span class="val">64px</span></div>
  <div class="row"><span class="name">--space-9</span><div class="bar" style="width:96px"></div><span class="val">96px</span></div>
</div>
</body>
</html>
