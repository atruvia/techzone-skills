<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 32px; background: #fff; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 18px; border-bottom: 1px solid var(--atr-line); padding-bottom: 8px; }
  .row:last-child { border-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); width: 130px; flex: 0 0 130px; }
  .sample { font-family: 'Atruvia', sans-serif; color: var(--atr-navy); font-size: 28px; line-height: 1.1; letter-spacing: -0.01em; }
</style>
</head>
<body>
<div class="stack">
  <div class="row"><span class="label">Light · 300</span><span class="sample" style="font-weight:300">Wir verbinden.</span></div>
  <div class="row"><span class="label">Regular · 400</span><span class="sample" style="font-weight:400">Wir verbinden.</span></div>
  <div class="row"><span class="label">Medium · 500</span><span class="sample" style="font-weight:500">Wir verbinden.</span></div>
  <div class="row"><span class="label">Bold · 700</span><span class="sample" style="font-weight:700">Wir verbinden.</span></div>
</div>
</body>
</html>
