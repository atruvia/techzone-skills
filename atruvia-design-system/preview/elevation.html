<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--atr-cream); display: flex; gap: 32px; align-items: center; }
  .card { background: var(--atr-white); border-radius: 12px; padding: 20px 24px; width: 200px; }
  .soft { box-shadow: 0 1px 2px rgba(0,0,100,0.04), 0 4px 12px rgba(0,0,100,0.06); }
  .pop { box-shadow: 0 8px 24px rgba(0,0,100,0.12); }
  .none { border: 1px solid var(--atr-line); }
  h4 { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--atr-navy); margin: 0 0 4px; }
  p { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); margin: 0; line-height: 1.4; }
</style>
</head>
<body>
<div class="card none"><h4>Flat</h4><p>border 1px<br>--atr-line</p></div>
<div class="card soft"><h4>Soft</h4><p>--shadow-soft<br>card hover</p></div>
<div class="card pop"><h4>Pop</h4><p>--shadow-pop<br>menus, modals</p></div>
</body>
</html>
