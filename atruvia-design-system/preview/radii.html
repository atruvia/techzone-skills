<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--atr-cream); display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
  .box { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .swatch { width: 96px; height: 64px; background: var(--atr-navy); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--atr-ink-3); }
</style>
</head>
<body>
<div class="box"><div class="swatch" style="border-radius:0"></div><span class="name">--r-none</span><span class="val">0</span></div>
<div class="box"><div class="swatch" style="border-radius:4px"></div><span class="name">--r-sm</span><span class="val">4px</span></div>
<div class="box"><div class="swatch" style="border-radius:8px"></div><span class="name">--r-md</span><span class="val">8px · cards</span></div>
<div class="box"><div class="swatch" style="border-radius:12px"></div><span class="name">--r-lg</span><span class="val">12px</span></div>
<div class="box"><div class="swatch" style="border-radius:16px"></div><span class="name">--r-xl</span><span class="val">16px</span></div>
<div class="box"><div class="swatch" style="border-radius:999px"></div><span class="name">--r-pill</span><span class="val">999px · buttons</span></div>
</body>
</html>
