<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: #fff; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; position: relative; overflow: hidden; }
  .chip .hex { position: absolute; bottom: 8px; left: 10px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--atr-navy); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--atr-ink-2); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw">
    <div class="chip" style="background:#000064;color:#fff"><span class="hex">#000064</span></div>
    <div class="name">Navy</div>
    <div class="meta">--atr-navy · text + brand</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#0a5ae1;color:#fff"><span class="hex">#0a5ae1</span></div>
    <div class="name">Blue</div>
    <div class="meta">--atr-blue · links + CTAs</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#fd5f4c;color:#fff"><span class="hex">#fd5f4c</span></div>
    <div class="name">Coral</div>
    <div class="meta">--atr-coral · VIA line only</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#d4f2f5;color:var(--atr-navy);border:1px solid var(--atr-line)"><span class="hex">#d4f2f5</span></div>
    <div class="name">Cyan soft</div>
    <div class="meta">--atr-cyan-soft · sections</div>
  </div>
</div>
</body>
</html>
