<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--atr-cream); }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.4 / 1; border-radius: 10px; position: relative; overflow: hidden; color: var(--atr-cream); }
  .chip .hex { position: absolute; bottom: 8px; left: 10px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .chip .label { position: absolute; top: 10px; left: 10px; font-family: var(--font-display); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .name { font-family: var(--font-display); font-size: 12px; font-weight: 600; color: var(--atr-ink); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--atr-ink-2); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw">
    <div class="chip" style="background:#1F5C4D"><span class="label">Success</span><span class="hex">#1F5C4D</span></div>
    <div class="name">Success</div>
    <div class="meta">--atr-success</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#C77A00"><span class="label">Warning</span><span class="hex">#C77A00</span></div>
    <div class="name">Warning</div>
    <div class="meta">--atr-warning</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#B23A2A"><span class="label">Danger</span><span class="hex">#B23A2A</span></div>
    <div class="name">Danger</div>
    <div class="meta">--atr-danger</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#1E1E7A"><span class="label">Info</span><span class="hex">#1E1E7A</span></div>
    <div class="name">Info</div>
    <div class="meta">--atr-info</div>
  </div>
</div>
</body>
</html>
