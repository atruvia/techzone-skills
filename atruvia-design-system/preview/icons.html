<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { padding: 22px 28px; background: var(--atr-cream); display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 18px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic svg { color: var(--atr-navy); width: 22px; height: 22px; stroke-width: 1.6; }
  .ic span { font-family: var(--font-mono); font-size: 9px; color: var(--atr-ink-3); text-transform: lowercase; letter-spacing: 0.04em; }
  .footnote { grid-column: 1 / -1; font-family: var(--font-mono); font-size: 10px; color: var(--atr-ink-3); margin-top: 4px; }
</style>
</head>
<body>
<div class="ic"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
<div class="ic"><i data-lucide="check"></i><span>check</span></div>
<div class="ic"><i data-lucide="users"></i><span>users</span></div>
<div class="ic"><i data-lucide="building-2"></i><span>building-2</span></div>
<div class="ic"><i data-lucide="globe"></i><span>globe</span></div>
<div class="ic"><i data-lucide="briefcase"></i><span>briefcase</span></div>
<div class="ic"><i data-lucide="lock"></i><span>lock</span></div>
<div class="ic"><i data-lucide="search"></i><span>search</span></div>
<div class="ic"><i data-lucide="menu"></i><span>menu</span></div>
<div class="ic"><i data-lucide="x"></i><span>x</span></div>
<div class="ic"><i data-lucide="play"></i><span>play</span></div>
<div class="ic"><i data-lucide="chevron-right"></i><span>chevron-right</span></div>
<div class="ic"><i data-lucide="mail"></i><span>mail</span></div>
<div class="ic"><i data-lucide="map-pin"></i><span>map-pin</span></div>
<div class="ic"><i data-lucide="calendar"></i><span>calendar</span></div>
<div class="ic"><i data-lucide="leaf"></i><span>leaf</span></div>
<div class="footnote">Lucide · 1.6 stroke · placeholder set — confirm before launch</div>
<script>lucide.createIcons();</script>
</body>
</html>
