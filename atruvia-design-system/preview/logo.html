<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--atr-cream); display: flex; align-items: center; min-height: 110px; }
  .logo-row { display: flex; align-items: center; gap: 48px; }
  .light { background: var(--atr-cream); padding: 16px 24px; border: 1px solid var(--atr-line); border-radius: 8px; }
  .dark { background: var(--atr-navy); padding: 16px 24px; border-radius: 8px; }
  .dark img { filter: brightness(0) invert(1); }
  img { height: 36px; display: block; }
</style>
</head>
<body>
<div class="logo-row">
  <div class="light"><img src="../assets/atruvia-logo.svg" alt="Atruvia"></div>
  <div class="dark"><img src="../assets/atruvia-logo.svg" alt="Atruvia"></div>
  <img src="../assets/via-mark.svg" alt="VIA mark" style="height:46px;">
</div>
</body>
</html>
