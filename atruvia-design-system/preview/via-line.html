<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--atr-surface-cyan); display: flex; align-items: center; justify-content: center; min-height: 100px; }
  .diagram { width: 100%; max-width: 600px; height: 100px; }
  text { font-family: var(--font-display); font-weight: 700; }
</style>
</head>
<body>
<svg class="diagram" viewBox="0 0 600 100" preserveAspectRatio="xMidYMid meet">
  <g fill="none" stroke="#fd5f4c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- VIA line connecting words: angular + curved -->
    <path d="M 120 50 L 140 50 L 140 22 L 220 22 L 250 50 L 320 50 Q 360 50 360 70 Q 360 90 380 90 Q 400 90 400 70 Q 400 50 380 50 L 460 50"/>
  </g>
  <g fill="#000064" text-anchor="middle">
    <text x="60" y="55" font-size="16">Verbindung</text>
    <text x="180" y="14" font-size="14">Mensch</text>
    <text x="530" y="55" font-size="16">Technologie</text>
  </g>
</svg>
</body>
</html>
