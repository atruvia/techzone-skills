<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--atr-line); padding-bottom: 10px; }
  .row:last-child { border-bottom: 0; padding-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); width: 80px; flex: 0 0 80px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sample { color: var(--atr-navy); line-height: 1.2; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Hero · 500</span>
    <div class="sample" style="font-family:var(--font-display);font-weight:500;font-size:52px;letter-spacing:-0.02em;">Wir sind Atruvia.</div>
  </div>
  <div class="row">
    <span class="label">H1 · 500</span>
    <div class="sample" style="font-family:var(--font-display);font-weight:500;font-size:36px;letter-spacing:-0.02em;">Verbindungen schaffen.</div>
  </div>
  <div class="row">
    <span class="label">H2 · 500</span>
    <div class="sample" style="font-family:var(--font-display);font-weight:500;font-size:26px;letter-spacing:-0.01em;">Füreinander in eine bessere Zukunft</div>
  </div>
</div>
</body>
</html>
