<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Textarea, Checkbox, Radio, Switch } = window.AtruviaDesignSystem_79ca21;
  function Demo() {
    return (
      <div className="grid">
        <div className="col">
          <Input label="E-Mail" placeholder="name@bank.de" defaultValue="" />
          <Select label="Bankverfahren" defaultValue="agree21">
            <option value="agree21">agree21</option>
            <option value="omnikanal">Omnikanal-Plattform</option>
          </Select>
          <Input label="Kontonummer" error="Bitte gültige IBAN eingeben" defaultValue="DE00 1234" />
        </div>
        <div className="col">
          <Textarea label="Nachricht" placeholder="Wie können wir helfen?" rows="3" />
          <div className="row">
            <Checkbox label="AGB akzeptieren" defaultChecked />
            <Checkbox label="Newsletter" />
          </div>
          <div className="row">
            <Radio name="r" label="Privat" defaultChecked />
            <Radio name="r" label="Firma" />
            <Switch label="Push aktiv" defaultChecked />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
