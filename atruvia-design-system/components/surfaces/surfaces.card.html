<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-sunken); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .muted { color: var(--text-muted); font-size: var(--text-sm); margin: 6px 0 16px; }
  h4 { margin: 0; font-family: var(--font-display); font-size: var(--text-lg); color: var(--text-strong); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card, Tabs, Dialog, Button, Badge } = window.AtruviaDesignSystem_79ca21;
  function Demo() {
    const [open, setOpen] = React.useState(false);
    const [tab, setTab] = React.useState("konto");
    return (
      <div className="grid">
        <Card raised>
          <Badge variant="brand">agree21</Badge>
          <h4 style={{marginTop:10}}>Girokonto</h4>
          <p className="muted">Alle Umsätze sicher im Blick — einfach. sicher. digital.</p>
          <Button variant="primary" size="sm">Öffnen</Button>
        </Card>
        <div style={{display:'flex', flexDirection:'column', gap:16}}>
          <div style={{background:'var(--surface-card)', borderRadius:'var(--radius-card)', padding:'8px 16px 16px', border:'1px solid var(--border-subtle)'}}>
            <Tabs value={tab} onChange={setTab} tabs={[
              {value:'konto', label:'Konto'},
              {value:'depot', label:'Depot'},
              {value:'kredit', label:'Kredit'},
            ]} />
            <p className="muted" style={{marginBottom:0}}>Aktiver Tab: <b>{tab}</b></p>
          </div>
          <Button variant="secondary" onClick={() => setOpen(true)}>Dialog öffnen</Button>
        </div>
        <Dialog open={open} onClose={() => setOpen(false)} title="Überweisung bestätigen"
          actions={<><Button variant="ghost" onClick={() => setOpen(false)}>Abbrechen</Button><Button variant="primary" onClick={() => setOpen(false)}>Bestätigen</Button></>}>
          Du sendest 250,00 € an Volksbank Musterstadt. Fortfahren?
        </Dialog>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
