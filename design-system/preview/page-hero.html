<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: var(--atr-surface-cyan); }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-family: var(--font-display); font-weight: 300; font-size: 64px; color: var(--atr-navy); margin: 0 0 16px; line-height: 1; letter-spacing: -0.02em; }
  p { font-family: var(--font-body); font-weight: 400; font-size: 16px; color: var(--atr-navy); margin: 0; }
  p strong { font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Werte</h1>
  <p><strong>Miteinander und füreinander:</strong> Diese Leitgedanken prägen Atruvia. Sie werden nach innen und nach außen gelebt.</p>
</div>
</body>
</html>
