<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; background: #fff; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--atr-line); padding-bottom: 8px; }
  .row:last-child { border-bottom: 0; padding-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--atr-ink-2); width: 90px; flex: 0 0 90px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sample { color: var(--atr-navy); line-height: 1.5; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="label">Lead · 400</span>
    <div class="sample" style="font-family:var(--font-body);font-weight:400;font-size:20px;">Bei uns steht das „Wir" im Vordergrund.</div>
  </div>
  <div class="row">
    <span class="label">Body · 400</span>
    <div class="sample" style="font-family:var(--font-body);font-weight:400;font-size:18px;">Wir schaffen Verbindungen und bringen Menschen, Projekte und Visionen zusammen.</div>
  </div>
  <div class="row">
    <span class="label">Link · 400</span>
    <div class="sample" style="font-family:var(--font-body);font-weight:400;font-size:18px;color:#0a5ae1;">Mehr über unsere Leistungen erfahren</div>
  </div>
  <div class="row">
    <span class="label">Eyebrow</span>
    <div class="sample" style="font-family:var(--font-display);font-weight:600;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;color:#0a5ae1;">UNTERNEHMEN · WIR SIND ATRUVIA</div>
  </div>
</div>
</body>
</html>
