<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; margin: 0; background: var(--atr-surface-cyan); }
  .card { background: #fff; padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; max-width: 620px; margin: 16px auto; }
  .row { display: flex; gap: 22px; align-items: center; }
  .portrait { width: 100px; height: 120px; flex: 0 0 100px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--atr-navy), var(--atr-blue)); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: 1px; }
  .info { display: flex; flex-direction: column; gap: 4px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 22px; color: var(--atr-navy); margin: 0; line-height: 1.2; }
  .role { font-family: var(--font-body); font-size: 16px; color: var(--atr-navy); margin: 0; }
  .mail { display: flex; align-items: center; gap: 8px; font-size: 16px; color: var(--atr-navy); }
  .mail strong { font-weight: 700; }
  .mail a { color: var(--atr-blue); text-decoration: underline; }
  .ic { width: 18px; height: 14px; color: var(--atr-blue); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="portrait" role="img" aria-label="Eik Wauschkuhn">EW</div>
    <div class="info">
      <h3 class="name">Eik Wauschkuhn</h3>
      <p class="role">Sales Manager Banking</p>
    </div>
  </div>
  <div class="mail">
    <strong>E-Mail:</strong>
    <svg class="ic" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="22" height="16" rx="1"/><path d="M2 3 L12 11 L22 3"/></svg>
    <a href="mailto:sales@atruvia.de">sales@atruvia.de</a>
  </div>
</div>
</body>
</html>
