<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; background: #fff; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-start; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 180px; }
  label { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--atr-navy); letter-spacing: 0.02em; }
  input, select { font-family: var(--font-body); font-size: 16px; padding: 12px 14px; background: #fff; border: 1px solid var(--atr-line); border-radius: 8px; color: var(--atr-navy); transition: border-color var(--dur-fast) var(--ease); }
  input:focus, select:focus { outline: none; border-color: var(--atr-blue); box-shadow: 0 0 0 3px rgba(10, 90, 225, 0.15); }
  .hint { font-family: var(--font-body); font-size: 13px; color: var(--atr-ink-2); }
</style>
</head>
<body>
<div class="field">
  <label for="n">Name</label>
  <input id="n" type="text" value="Sira Helfer">
</div>
<div class="field">
  <label for="e">E-Mail</label>
  <input id="e" type="email" placeholder="du@example.com">
  <div class="hint">Wir antworten innerhalb von 24 h.</div>
</div>
<div class="field">
  <label for="r">Rolle</label>
  <select id="r">
    <option>Volksbank · Berater*in</option>
    <option>Partner*in</option>
    <option>Mitarbeiter*in</option>
  </select>
</div>
</body>
</html>
