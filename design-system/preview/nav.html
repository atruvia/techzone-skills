<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 28px; background: #fff; }
  nav { display: flex; align-items: center; gap: 32px; }
  .brand img { height: 24px; display: block; }
  .links { display: flex; gap: 28px; flex: 1; }
  a { font-family: var(--font-display); font-weight: 500; font-size: 15px; color: var(--atr-navy); text-decoration: none; padding-bottom: 4px; border-bottom: 2px solid transparent; }
  a.active { border-bottom-color: var(--atr-blue); }
  a:hover { color: var(--atr-blue); }
  .cta { font-family: var(--font-display); font-weight: 500; font-size: 14px; background: var(--atr-navy); color: #fff; padding: 10px 20px; border-radius: 999px; text-decoration: none; }
  .cta:hover { background: var(--atr-navy-deep); color: #fff; }
</style>
</head>
<body>
<nav>
  <a class="brand" href="#"><img src="../assets/atruvia-logo.svg" alt="Atruvia"></a>
  <div class="links">
    <a href="#" class="active">Karriere</a>
    <a href="#">Unternehmen</a>
    <a href="#">Leistungen</a>
    <a href="#">News</a>
  </div>
  <a class="cta" href="#">Kontakt</a>
</nav>
</body>
</html>
