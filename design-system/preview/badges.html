<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: #fff; display: flex; gap: 14px; flex-wrap: wrap; }
  .badge { font-family: var(--font-display); font-weight: 500; font-size: 13px; padding: 6px 12px; border-radius: 999px; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .b--ok { background: #d4f2f5; color: var(--atr-navy); }
  .b--ok .dot { background: var(--atr-blue); }
  .b--info { background: #d4f2f5; color: var(--atr-navy); }
  .b--info .dot { background: var(--atr-navy); }
  .b--accent { background: var(--atr-navy); color: #fff; }
  .b--outline { border: 1px solid var(--atr-navy); color: var(--atr-navy); }
  .b--blue { background: var(--atr-blue); color: #fff; }
</style>
</head>
<body>
<span class="badge b--ok"><span class="dot"></span>Live</span>
<span class="badge b--info"><span class="dot"></span>Beta</span>
<span class="badge b--accent">Neu</span>
<span class="badge b--outline">Karriere</span>
<span class="badge b--blue">Genossenschaftliche FinanzGruppe</span>
</body>
</html>
